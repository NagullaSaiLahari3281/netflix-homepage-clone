<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <h1 class="logo">NETFLIX</h1>
  <button class="btn">Sign In</button>
</header>

<!-- Hero Section -->
<section class="hero">
  <div class="hero-content">
    <h1>Unlimited movies, TV shows and more</h1>
    <p>Watch anywhere. Cancel anytime.</p>
    <input type="email" placeholder="Enter your email">
    <button class="btn">Get Started</button>
  </div>
</section>

<!-- Feature Section -->
<section class="feature">
  <div class="text">
    <h2>Enjoy on your TV</h2>
    <p>Watch on smart TVs, PlayStation, Xbox, Chromecast, and more.</p>
  </div>
  <img src="assets/images/tv.png" alt="TV">
</section>

<section class="feature">
  <img src="assets/images/mobile.png" alt="Mobile">
  <div class="text">
    <h2>Download your shows</h2>
    <p>Save your favorites and watch offline.</p>
  </div>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 Netflix Clone</p>
</footer>

</body>
</html>
